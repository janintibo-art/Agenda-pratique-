# Place ce fichier dans le dÃ©pÃ´t sous : .github/workflows/build-apk.yml
# Il faut aussi que l'archive (mon-agenda.zip) soit commitÃ©e Ã  la racine du dÃ©pÃ´t.
#
# Ce que fait ce workflow :
#   1. Extrait le ZIP de l'application web
#   2. L'enveloppe avec Capacitor (l'app est EMBARQUÃ‰E dans l'APK, aucun hÃ©bergement)
#   3. Compile un APK Android (debug, installable pour tester)
#   4. Met l'APK Ã  disposition en Â« artefact Â» tÃ©lÃ©chargeable de l'exÃ©cution
#
# Lancement : Ã  chaque push sur main, ou manuellement (onglet Actions â†’ Run workflow).

name: Construire l'APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: RÃ©cupÃ©rer le dÃ©pÃ´t
        uses: actions/checkout@v4

      - name: Extraire le ZIP de l'application
        run: |
          set -e
          ZIP=$(ls *.zip | head -n1)
          if [ -z "$ZIP" ]; then echo "Aucune archive .zip trouvÃ©e Ã  la racine du dÃ©pÃ´t."; exit 1; fi
          echo "Archive : $ZIP"
          unzip -o "$ZIP" -d _app
          INDEX=$(find _app -name index.html | head -n1)
          if [ -z "$INDEX" ]; then echo "index.html introuvable dans le ZIP."; exit 1; fi
          WEBDIR=$(dirname "$INDEX")
          echo "WEBDIR=$WEBDIR" >> "$GITHUB_ENV"
          echo "Dossier web dÃ©tectÃ© : $WEBDIR"

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: PrÃ©parer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Composants Android requis
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Envelopper avec Capacitor
        run: |
          set -e
          npm init -y >/dev/null
          npm install @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6 @capacitor/local-notifications@^6 @capacitor/haptics@^6
          cat > capacitor.config.json <<JSON
          {
            "appId": "com.monagenda.app",
            "appName": "Mon Agenda",
            "webDir": "${WEBDIR}"
          }
          JSON
          npx cap add android
          npx cap sync android

      - name: IcÃ´ne de l'app (lotus)
        run: |
          set -e
          cp -r "${WEBDIR}/app-icon/res/." android/app/src/main/res/
          echo "IcÃ´nes lotus appliquÃ©es (adaptatif + hÃ©ritage)."

      - name: Ajouter le widget d'Ã©cran d'accueil (natif)
        run: |
          set -e
          SRC="${WEBDIR}/android-widget"
          MAIN="android/app/src/main"
          mkdir -p "$MAIN/java/com/monagenda/app" "$MAIN/res/layout" "$MAIN/res/xml" "$MAIN/res/drawable"
          cp "$SRC/MonAgendaWidget.java"       "$MAIN/java/com/monagenda/app/MonAgendaWidget.java"
          cp "$SRC/widget_mon_agenda.xml"      "$MAIN/res/layout/widget_mon_agenda.xml"
          cp "$SRC/mon_agenda_widget_info.xml" "$MAIN/res/xml/mon_agenda_widget_info.xml"
          cp "$SRC/widget_background.xml"       "$MAIN/res/drawable/widget_background.xml"
          cp "${WEBDIR}/assets/icons/lotus-logo.png" "$MAIN/res/drawable/widget_lotus.png"
          python3 "$SRC/patch_manifest.py"
          echo "Widget injectÃ© dans le projet Android."

      - name: Compiler l'APK (debug)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: mon-agenda-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
